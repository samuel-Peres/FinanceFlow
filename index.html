async function doLoginGoogle() {
  const btn = document.querySelector('.google-btn');
  if (!btn) return;
  
  btn.disabled = true;
  btn.innerHTML = '⏳ Redirecionando...';
  
  try {
    // Pega a URL base atual (funciona no GitHub Pages e Netlify)
    const currentUrl = window.location.origin;
    
    const { data, error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: currentUrl,
        queryParams: {
          access_type: 'offline',
          prompt: 'consent',
        }
      }
    });
    
    if (error) throw error;
    
    // O redirect acontece automaticamente
    console.log('Redirecionando para Google...');
    
  } catch (error) {
    console.error('Erro detalhado:', error);
    showToast('❌ Erro ao conectar com Google: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continuar com Google`;
  }
}

// Verifica sessão ao carregar a página
async function checkSession() {
  const { data: { session }, error } = await sb.auth.getSession();
  
  if (session?.user) {
    // Usuário logado
    document.getElementById('loginPage')?.classList.remove('active');
    document.getElementById('sidebar')?.style.setProperty('display', 'flex');
    document.getElementById('mainContent')?.style.display = 'block';
    document.getElementById('bottomNav')?.style.display = 'flex';
    document.getElementById('mobileUserBar')?.style.display = 'flex';
    
    // Atualiza informações do usuário
    const user = session.user;
    const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Usuário';
    const email = user.email || 'sem email';
    const initial = name.charAt(0).toUpperCase();
    
    // Desktop
    const avatarDesktop = document.getElementById('avatarDesktop');
    const userNameDesktop = document.getElementById('userNameDesktop');
    const userEmailDesktop = document.getElementById('userEmailDesktop');
    if (avatarDesktop) avatarDesktop.textContent = initial;
    if (userNameDesktop) userNameDesktop.textContent = name;
    if (userEmailDesktop) userEmailDesktop.textContent = email;
    
    // Mobile
    const mobileAvatar = document.getElementById('mobileAvatar');
    const mobileUserName = document.getElementById('mobileUserName');
    const mobileUserEmail = document.getElementById('mobileUserEmail');
    if (mobileAvatar) mobileAvatar.textContent = initial;
    if (mobileUserName) mobileUserName.textContent = name;
    if (mobileUserEmail) mobileUserEmail.textContent = email;
    
    // Carrega dados do app
    if (typeof loadDashboard === 'function') loadDashboard();
    if (typeof loadTransactions === 'function') loadTransactions();
    
  } else {
    // Usuário não logado
    document.getElementById('loginPage')?.classList.add('active');
    document.getElementById('sidebar')?.style.setProperty('display', 'none');
    document.getElementById('mainContent')?.style.display = 'none';
    document.getElementById('bottomNav')?.style.display = 'none';
    document.getElementById('mobileUserBar')?.style.display = 'none';
  }
}

// Login com email/senha
async function doLogin() {
  const email = document.getElementById('loginEmail')?.value;
  const password = document.getElementById('loginPassword')?.value;
  
  if (!email || !password) {
    showToast('❌ Preencha e-mail e senha');
    return;
  }
  
  const { data, error } = await sb.auth.signInWithPassword({ 
    email, 
    password 
  });
  
  if (error) {
    if (error.message.includes('Invalid login')) {
      showToast('❌ E-mail ou senha incorretos');
    } else if (error.message.includes('Email not confirmed')) {
      showToast('❌ Confirme seu e-mail primeiro');
    } else {
      showToast('❌ ' + error.message);
    }
    return;
  }
  
  await checkSession();
  showToast('✅ Login realizado com sucesso!');
}

// Criar conta
async function doSignUp() {
  const email = document.getElementById('loginEmail')?.value;
  const password = document.getElementById('loginPassword')?.value;
  
  if (!email || !password) {
    showToast('❌ Preencha e-mail e senha');
    return;
  }
  
  if (password.length < 6) {
    showToast('❌ Senha deve ter no mínimo 6 caracteres');
    return;
  }
  
  const { data, error } = await sb.auth.signUp({ 
    email, 
    password,
    options: {
      emailRedirectTo: window.location.origin
    }
  });
  
  if (error) {
    showToast('❌ ' + error.message);
    return;
  }
  
  if (data.user) {
    showToast('✅ Conta criada! Verifique seu e-mail.');
    // Muda para modo login
    toggleMode();
  }
}

// Logout
async function doLogout() {
  const { error } = await sb.auth.signOut();
  if (error) {
    showToast('❌ Erro ao sair: ' + error.message);
  } else {
    await checkSession();
    showToast('✅ Até logo!');
  }
}

// Alternar entre login e cadastro
let isLoginMode = true;
function toggleMode() {
  isLoginMode = !isLoginMode;
  const loginTitle = document.getElementById('loginTitle');
  const loginSub = document.getElementById('loginSub');
  const loginBtn = document.getElementById('loginBtn');
  const loginFooter = document.getElementById('loginFooter');
  const googleBtn = document.querySelector('.google-btn');
  
  if (isLoginMode) {
    if (loginTitle) loginTitle.textContent = 'Bem-vindo de volta';
    if (loginSub) loginSub.textContent = 'Faça login para acessar seu painel financeiro.';
    if (loginBtn) loginBtn.textContent = 'Entrar';
    if (loginBtn) loginBtn.onclick = doLogin;
    if (loginFooter) loginFooter.innerHTML = 'Não tem conta? <a onclick="toggleMode()">Criar conta grátis</a>';
    if (googleBtn) googleBtn.style.display = 'flex';
  } else {
    if (loginTitle) loginTitle.textContent = 'Criar conta';
    if (loginSub) loginSub.textContent = 'Cadastre-se para começar a controlar suas finanças.';
    if (loginBtn) loginBtn.textContent = 'Cadastrar';
    if (loginBtn) loginBtn.onclick = doSignUp;
    if (loginFooter) loginFooter.innerHTML = 'Já tem conta? <a onclick="toggleMode()">Fazer login</a>';
    if (googleBtn) googleBtn.style.display = 'none';
  }
}

// Toast notification
function showToast(message, isError = false) {
  let toast = document.querySelector('.toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  
  toast.textContent = message;
  toast.style.color = isError ? 'var(--red)' : 'var(--green)';
  toast.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  toast.classList.add('show');
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Navegação entre páginas
function showPage(pageId, element, type = 'sidebar') {
  // Esconde todas as páginas
  document.querySelectorAll('.page').forEach(page => {
    page.classList.remove('active');
  });
  
  // Mostra a página selecionada
  const targetPage = document.getElementById(`page-${pageId}`);
  if (targetPage) targetPage.classList.add('active');
  
  // Atualiza active nos menus
  if (type === 'sidebar') {
    document.querySelectorAll('.sidebar .nav-item').forEach(item => {
      item.classList.remove('active');
    });
    if (element) element.classList.add('active');
  } else {
    document.querySelectorAll('.bottom-nav .bn-item').forEach(item => {
      item.classList.remove('active');
    });
    if (element) element.classList.add('active');
  }
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
  checkSession();
  
  // Adicionar listener para Enter nos inputs de login
  const emailInput = document.getElementById('loginEmail');
  const passwordInput = document.getElementById('loginPassword');
  
  if (emailInput && passwordInput) {
    const handleEnter = (e) => {
      if (e.key === 'Enter') {
        if (isLoginMode) doLogin();
        else doSignUp();
      }
    };
    emailInput.addEventListener('keypress', handleEnter);
    passwordInput.addEventListener('keypress', handleEnter);
  }
});

// Expor funções globalmente
window.doLoginGoogle = doLoginGoogle;
window.doLogin = doLogin;
window.doSignUp = doSignUp;
window.doLogout = doLogout;
window.toggleMode = toggleMode;
window.showPage = showPage;
window.showToast = showToast;
window.loadDashboard = loadDashboard;
window.loadTransactions = loadTransactions;
